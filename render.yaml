services:
  - type: web
    name: visionextract
    runtime: python
    pythonVersion: "3.10.13"  # EXPLICITLY forces Python 3.10
    buildCommand: |
      pip install --upgrade pip setuptools wheel
      pip install pillow==9.5.0 --no-cache-dir
      pip install -r requirements.txt --no-cache-dir
    startCommand: gunicorn app:app --workers 1 --threads 2 --timeout 120
